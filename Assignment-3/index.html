<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MetaMask Transaction App</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
      margin: 0;
      padding: 0;
    }

    .container {
      background: #ffffff;
      padding: 30px;
      margin: 80px auto;
      width: 360px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #0d47a1;
    }

    h3 {
      margin-top: 25px;
      margin-bottom: 10px;
      color: #333;
    }

    p {
      margin: 10px 0;
      font-size: 14px;
      color: #555;
      word-break: break-all;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #2196f3;
      box-shadow: 0 0 5px rgba(33, 150, 243, 0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #2196f3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #1976d2;
    }

    button:active {
      transform: scale(0.98);
    }

    hr {
      margin: 20px 0;
      border: none;
      height: 1px;
      background: #ddd;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      color: #0d47a1;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Blockchain Transaction</h1>

    <button onclick="connectWallet()">Connect MetaMask</button>
    <p id="account">Account: Not connected</p>

    <hr>

    <h3>Send Transaction</h3>

    <input type="text" id="to" placeholder="Receiver Address">
    <input type="text" id="amount" placeholder="Amount in ETH">

    <button onclick="sendTransaction()">Send</button>

    <p id="status"></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
